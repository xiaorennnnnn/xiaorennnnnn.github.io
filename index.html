            padding-top: 50px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: inline-block;
            max-width: 500px;
            width: 90%;

        h1 {

        }
        .sub {

            font-size: 16px;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 16px 20px;
            background: #4CAF50;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 0 #2d6a30;
            transition: 0.1s ease;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #2d6a30;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #2d6a30;
        }
        .btn-blue {
            background: #2196F3;
            box-shadow: 0 5px 0 #0b5e9e;
        }
        .btn-blue:hover {
            background: #1e88e5;
            box-shadow: 0 3px 0 #0b5e9e;
        }
        .btn-orange {
            background: #FF9800;
            box-shadow: 0 5px 0 #b86d00;
        }
        .btn-orange:hover {
            background: #f57c00;
            box-shadow: 0 3px 0 #b86d00;
        }
        .tip {
            color: #888;
            margin-top: 25px;
            font-size: 13px;
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .tip small {
            display: block;
            margin-top: 5px;
            color: #f44336;
        }
    </style>
</head>
